name: Build and release Windows

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, e.g. v6.4.67-zh.1"
        required: true
        type: string
      release_name:
        description: "Release title"
        required: false
        default: "Praat 6.4.67 中文版"
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            make
            zip
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-pkgconf

      - name: Build Praat
        run: make PRAAT_ARCH=x64v3 -j2

      - name: Prepare release package
        env:
          PACKAGE_NAME: Praat-${{ inputs.tag_name }}-Windows-x64.zip
        run: |
          mkdir -p dist
          cp Praat.exe dist/Praat.exe
          cat > dist/README.txt <<'EOF'
          Praat 简体中文本地化版本。

          双击 Praat.exe 运行。
          本版本基于官方 Praat 源码构建，是非官方中文本地化版本。
          EOF
          cd dist
          zip -9 "$PACKAGE_NAME" Praat.exe README.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Praat-${{ inputs.tag_name }}-Windows-x64
          path: dist/Praat-${{ inputs.tag_name }}-Windows-x64.zip

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
          RELEASE_NAME: ${{ inputs.release_name }}
          PACKAGE_NAME: Praat-${{ inputs.tag_name }}-Windows-x64.zip
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $args = @(
            "release", "create", $env:TAG_NAME,
            "dist/$env:PACKAGE_NAME",
            "--target", "${{ github.sha }}",
            "--title", $env:RELEASE_NAME,
            "--notes", "基于 Praat 6.4.67 的非官方简体中文本地化版本。包含 Windows x64 可执行文件。"
          )

          if ($env:DRAFT -eq "true") {
            $args += "--draft"
          }
          if ($env:PRERELEASE -eq "true") {
            $args += "--prerelease"
          }

          gh @args
